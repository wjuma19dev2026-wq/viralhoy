<div
  class="card fade-in-on-load shadow-sm border-0 overflow-hidden h-100 transition-all hover-shadow"
  (click)="navigateTo()"
>
  <div class="row g-0">
    <!-- Imagen -->
    <div class="col-md-4 col-12">
      <img
        src="https://media.cnn.com/api/v1/images/stellar/prod/ap26063158305845.jpg?c=original&q=w_860,c_fill/f_avif"
        alt="Título de la noticia"
        class="img-fluid h-100 object-fit-cover rounded-start"
      />
    </div>

    <!-- Contenido a la derecha -->
    <div class="col-md-8 col-12">
      <div class="card-body p-3 p-md-4 d-flex flex-column h-100">
        <!-- Categoría -->
        <span class="text-uppercase rounded-pill badge text-bg-danger align-self-baseline mb-2">
          Sociales
        </span>

        <!-- Título -->
        <h5 class="card-title lead mb-2 line-clamp-2">
          Título de la noticia que puede ser bastante largo y debe cortarse elegantemente
        </h5>

        <!-- Autor + fecha -->
        <div class="mt-auto d-flex align-items-center gap-2 text-muted small">
          <img
            src="img/img-author2.jpg"
            alt="Autor"
            class="rounded-circle"
            style="width: 28px; height: 28px; object-fit: cover; border: 1px solid #e0e0e0"
          />
          <div class="d-flex align-items-center gap-3">
            <a href="#" class="fw-medium text-decoration-none text-info hover-text-info">
              Juan Pérez
            </a>
            <span class="d-flex align-items-center gap-1"> <i class="bi bi-clock"></i> 2 h </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
