<app-back-nav encabezado="Editar perfil" />

<div class="row mt-3 fade-in-on-load" style="margin-bottom: 150px">
  <div class="col-12">
    <div class="profile-section d-flex justify-content-center">
      <div class="profile-avatar-wrapper">
        <img src="img/img-author2.jpg" class="profile-avatar" alt="profile" />

        <div class="profile-badge camera" title="Usuario verificado">
          <i class="bi bi-camera-fill fs-5"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="col-12 mt-4">
    <form class="p-3">
      <div class="mb-3">
        <label for="nombre">Nombre</label>
        <input type="text" class="form-control rounded rounded-5" />
      </div>
      <div class="mb-3">
        <label for="alias">Alias</label>
        <input type="text" class="form-control rounded rounded-5" />
      </div>
      <div class="mb-3">
        <label for="nombre">Sobre mi</label>
        <textarea type="text" class="form-control" rows="6"></textarea>
      </div>
      <div class="d-grid gap-2 mt-4">
        <button
          class="btn btn-info btn-lg rounded rounded-5 d-flex justify-content-center align-items-center gap-2"
        >
          <i class="bi bi-floppy-fill"></i>
          Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
